<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alan Huynh</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #06060a;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Ambient gradient blobs */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(140px);
            opacity: 0.18;
        }

        .blob-1 {
            width: 700px;
            height: 700px;
            background: #4f46e5;
            top: -250px;
            left: -200px;
            animation: drift 10s ease-in-out infinite;
        }

        .blob-2 {
            width: 550px;
            height: 550px;
            background: #7c3aed;
            bottom: -200px;
            right: -150px;
            animation: drift 10s ease-in-out infinite reverse;
            animation-delay: -5s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #0ea5e9;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation: drift 14s ease-in-out infinite;
            animation-delay: -7s;
            opacity: 0.08;
        }

        @keyframes drift {
            0%, 100% { transform: translate(0, 0); }
            33%       { transform: translate(40px, -30px); }
            66%       { transform: translate(-25px, 20px); }
        }

        /* Noise overlay for texture */
        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
            opacity: 0.04;
        }

        /* Content */
        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 2rem;
        }

        .name {
            font-size: clamp(3.5rem, 11vw, 8rem);
            font-weight: 700;
            letter-spacing: -0.04em;
            line-height: 1;
            background: linear-gradient(135deg, #ffffff 20%, #a5b4fc 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: rise 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .subtitle {
            font-size: clamp(0.75rem, 1.8vw, 0.95rem);
            font-weight: 300;
            color: #4b5563;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            margin-top: 1rem;
            animation: rise 0.9s 0.12s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .divider {
            width: 1px;
            height: 40px;
            background: linear-gradient(to bottom, transparent, #1e1b4b, transparent);
            margin: 2rem auto;
            animation: rise 0.9s 0.24s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            animation: rise 0.9s 0.36s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .link {
            color: #374151;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.25s ease;
            position: relative;
        }

        .link svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            transition: transform 0.25s ease;
        }

        .link::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            width: 0;
            height: 1px;
            background: #818cf8;
            transition: width 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .link:hover {
            color: #818cf8;
        }

        .link:hover::after {
            width: 100%;
        }

        .link:hover svg {
            transform: translateY(-1px);
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>

    <div class="bg">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="content">
        <h1 class="name">alan huynh</h1>
        <p class="subtitle">software engineer</p>
        <div class="divider"></div>
